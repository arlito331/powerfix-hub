<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PowerFix Developers</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23E8442A'/%3E%3Cpath d='M17 6L9 16h6l-1 10 8-12h-6l1-8z' fill='%23fff'/%3E%3C/svg%3E">
<style>
:root{ --bg:#0D0D0D; --border:#222; --text:#f5f5f7; --muted:#86868b; --dim:#48484c; --red:#E8442A; }
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}

/* ---- shared brand ---- */
.brand{display:flex;align-items:center;justify-content:center;gap:9px;user-select:none;}
.brand-mark{width:26px;height:26px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.brand-name{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
.brand-name span{color:var(--red);cursor:default;}

/* ---- lock screen ---- */
.lock-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.lock-card{width:100%;max-width:300px;display:flex;flex-direction:column;}
.lock-card .brand{margin-bottom:40px;}
.lock-field{margin-bottom:14px;}
.lock-field label{display:block;font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-bottom:7px;}
.lock-field input{width:100%;background:#0a0a0a;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:11px 14px;font-size:14px;outline:none;font-family:inherit;}
.lock-field input:focus{border-color:#3a3a3e;}
.lock-btn{width:100%;background:var(--text);color:#0a0a0a;border:none;border-radius:8px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .15s;}
.lock-btn:hover{opacity:.85;}
.lock-error{font-size:12px;color:var(--muted);text-align:center;margin-top:14px;min-height:16px;}

/* ---- main page ---- */
.page{display:none;flex-direction:column;align-items:center;min-height:100vh;padding:52px 24px 40px;}
.page .brand{margin-bottom:96px;}

.headline{font-size:48px;font-weight:700;letter-spacing:-1.5px;line-height:1.08;text-align:center;margin-bottom:14px;}
.subhead{font-size:17px;color:var(--muted);text-align:center;margin-bottom:64px;font-weight:400;}

.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:620px;}
.tool-tile{display:flex;flex-direction:column;align-items:center;text-align:center;background:#111112;border:1px solid transparent;border-radius:18px;padding:36px 24px 30px;text-decoration:none;color:var(--text);transition:background .2s,transform .2s,border-color .2s;}
.tool-tile:hover{background:#161618;transform:translateY(-3px);border-color:#2a2a2e;}
.tool-logo{width:56px;height:56px;margin-bottom:20px;}
.tool-logo svg{width:100%;height:100%;}
.tool-name{font-size:16px;font-weight:600;letter-spacing:-0.2px;margin-bottom:6px;}
.tool-desc{font-size:12.5px;color:var(--muted);line-height:1.5;max-width:230px;}

.footer{margin-top:auto;padding-top:72px;font-size:11px;color:var(--dim);letter-spacing:0.2px;}
.footer a{color:var(--dim);text-decoration:none;margin-left:12px;}
.footer a:hover{color:var(--muted);}

@media (max-width: 560px){
  .page .brand{margin-bottom:56px;}
  .headline{font-size:34px;}
  .subhead{font-size:15px;margin-bottom:40px;}
  .tool-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="lock-overlay" id="lockOverlay">
  <div class="lock-card">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="#fff" width="14" height="14"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <div class="brand-name">Power<span>Fi<span id="lockX" onclick="realUnlock()">x</span></span></div>
    </div>
    <div class="lock-field">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="username" autocomplete="username"/>
    </div>
    <div class="lock-field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter'){event.preventDefault();fakeLogin();}"/>
    </div>
    <button class="lock-btn" onclick="fakeLogin()">Sign in</button>
    <div class="lock-error" id="loginError"></div>
  </div>
</div>

<div class="page" id="page">

  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="#fff" width="14" height="14"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    </div>
    <div class="brand-name">Power<span>Fix</span></div>
  </div>

  <div class="headline">Developer Tools</div>
  <div class="subhead">Four tools. One pipeline.</div>

  <div class="tool-grid">

    <a class="tool-tile" href="https://arlito331.github.io/potholewatch/">
      <div class="tool-logo">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="30" fill="#0D0D0D" stroke="#D94F2B" stroke-width="2.5"/><circle cx="32" cy="32" r="20" fill="none" stroke="#D94F2B" stroke-width="1" opacity="0.4"/><circle cx="32" cy="32" r="10" fill="none" stroke="#D94F2B" stroke-width="1" opacity="0.4"/><line x1="32" y1="4" x2="32" y2="60" stroke="#D94F2B" stroke-width="0.8" opacity="0.3"/><line x1="4" y1="32" x2="60" y2="32" stroke="#D94F2B" stroke-width="0.8" opacity="0.3"/><path d="M32 32 L32 4 A28 28 0 0 1 56 24 Z" fill="#D94F2B" opacity="0.35"/><circle cx="32" cy="32" r="4" fill="#D94F2B"/><circle cx="44" cy="20" r="2.5" fill="#FF5050"/><circle cx="20" cy="44" r="2" fill="#FF5050" opacity="0.8"/></svg>
      </div>
      <div class="tool-name">PotholeWatch</div>
      <div class="tool-desc">Incident monitor.</div>
    </a>

    <a class="tool-tile" href="https://arlito331.github.io/powerfix-case-study/#pf">
      <div class="tool-logo">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="16" r="15" fill="#E8442A"/><path d="M17 7L9.5 16.5h5.5l-1 8.5 7.5-10.5h-5.5l1-7.5z" fill="#fff"/></svg>
      </div>
      <div class="tool-name">Case Study Generator</div>
      <div class="tool-desc">ROI studies.</div>
    </a>

    <a class="tool-tile" href="https://arlito331.github.io/potholeradar/">
      <div class="tool-logo">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="16" r="15" fill="#0b0e14" stroke="#3f7fe0" stroke-width="1.2"/><circle cx="16" cy="16" r="12.5" fill="none" stroke="#3f7fe0" stroke-opacity=".35" stroke-width="1.4"/><circle cx="16" cy="16" r="8" fill="none" stroke="#3f7fe0" stroke-opacity=".28" stroke-width="1.2"/><line x1="2" y1="16" x2="30" y2="16" stroke="#3f7fe0" stroke-opacity=".18"/><line x1="16" y1="2" x2="16" y2="30" stroke="#3f7fe0" stroke-opacity=".18"/><path d="M16 16 L16 3.5 A12.5 12.5 0 0 1 27.3 22.5 Z" fill="#3f7fe0" fill-opacity=".35"/><circle cx="16" cy="16" r="2.4" fill="#3f7fe0"/></svg>
      </div>
      <div class="tool-name">PotholeRadar</div>
      <div class="tool-desc">Area scanner.</div>
    </a>

    <a class="tool-tile" href="https://arlito331.github.io/fixwatch/">
      <div class="tool-logo">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="16" r="15" fill="#0b0e14" stroke="#46c97e" stroke-width="1.2"/><circle cx="16" cy="16" r="12.5" fill="none" stroke="#46c97e" stroke-opacity=".35" stroke-width="1.4"/><circle cx="16" cy="16" r="8" fill="none" stroke="#46c97e" stroke-opacity=".28" stroke-width="1.2"/><path d="M11 16.5l3.2 3.2L21.5 12" fill="none" stroke="#46c97e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="tool-name">FixWatch</div>
      <div class="tool-desc">Durability tracker.</div>
    </a>

  </div>

  <div class="footer">PowerFix · Internal use only <a href="#" onclick="lockHub();return false;">Lock</a></div>

</div>

<script>
// Decoy login — the form always fails. The real unlock is clicking the "x" in "PowerFix".
function fakeLogin(){
  const el = document.getElementById('loginError');
  el.textContent = 'Sorry pal, maybe next time! 🤷';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

function showPage(){
  document.getElementById('lockOverlay').style.display = 'none';
  document.getElementById('page').style.display = 'flex';
}

function realUnlock(){
  localStorage.setItem('pf_hub_unlocked', '1');
  showPage();
}

function lockHub(){
  localStorage.removeItem('pf_hub_unlocked');
  document.getElementById('page').style.display = 'none';
  document.getElementById('lockOverlay').style.display = 'flex';
  document.getElementById('loginError').textContent = '';
}

if (localStorage.getItem('pf_hub_unlocked') === '1') showPage();
</script>

</body>
</html>
